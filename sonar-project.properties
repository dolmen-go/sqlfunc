sonar.organization=dolmen-go
sonar.projectKey=dolmen-go_sqlfunc

sonar.go.activate=true
sonar.dre.go.activate=true

# Output of "go test -json"
# sonar.go.tests.reportPaths=

# https://docs.sonarsource.com/sonarqube-server/analyzing-source-code/test-coverage/go-test-coverage
sonar.go.coverage.reportPaths=coverage.out

# sonar.go.golangci-lint.reportPaths=

# TODO
# sonar.githubactions.actionlint.reportPaths

# https://sonarcloud.io/project/settings?category=exclusions&id=dolmen-go_sqlfunc

# Ignore duplications in unit test code
sonar.cpd.exclusions=**/*_test.go

# Ignore coverage report for _test.go because "go test" doesn't report them anyway
sonar.coverage.exclusions=**/_test.go


sonar.issue.ignore.multicriteria=e1,e2,e3,e4

# Ignore function naming rule for Example
sonar.issue.ignore.multicriteria.e1.ruleKey=go:S100
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*_test.go

# Ignore cognitive complexity in tests
sonar.issue.ignore.multicriteria.e2.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*_test.go

# Ignore duplicate string literal
sonar.issue.ignore.multicriteria.e3.ruleKey=go:S1192
sonar.issue.ignore.multicriteria.e3.resourceKey=**/*.go

# Ignore empty function in *_off.go
sonar.issue.ignore.multicriteria.e4.ruleKey=go:S1186
sonar.issue.ignore.multicriteria.e4.resourceKey=**/*_off.go

# Get token: https://sonarcloud.io/project/configuration/GitHubManual?id=dolmen-go_sqlfunc
# List issues:
#  SONAR_TOKEN= curl --variable %SONAR_TOKEN -u '{{SONAR_TOKEN}}:' 'https://sonarcloud.io/api/issues/search?componentKeys=dolmen-go_sqlfunc&resolved=false'
#
# curl --variable '%SONAR_TOKEN' -u '{{SONAR_TOKEN}}:' 'https://sonarcloud.io/api/issues/search?componentKeys=dolmen-go_sqlfunc&resolved=false' | jq .