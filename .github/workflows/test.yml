name: Test and coverage

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        go-version:
          - 1.26.x
          - 1.25.x
          - 1.24.x
          # modernc.org/sqlite v1.40+ (used in tests) requires Go 1.24+
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        # We used to exclude old versions of Go (up to 1.19) on Windows
        # https://github.com/golang/go/issues/51007
        # exclude:
        #   - os: windows-latest
        #     go-version: 1.19.x
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout (with full history for SonarQube)
        uses: actions/checkout@v6
        if: matrix.os == 'ubuntu-latest'
        with:
          # Default is 1 (shallow clone with a single commit)
          # but SonarQube wants full history
          fetch-depth: 0
      - name: Checkout
        uses: actions/checkout@v6
        if: matrix.os != 'ubuntu-latest'
        with:
          fetch-depth: 2

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Download dependencies
        run: go mod download
      - name: Run coverage
        # Powershell Core has problems with '=': -coverprofile=coverage.out
        run: go test -v -race -coverprofile coverage.out -covermode atomic ./...
      - name: Run tests (JSON, for SonarQube)
        run: go test -json ./... >gotest.out
      - name: Upload coverage to Codecov (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: bash <(curl -s https://codecov.io/bash)
      - name: Upload coverage to Codecov (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install codecov
          codecov.exe -f coverage.out

      #- name: Archive code coverage results
      #  uses: actions/upload-artifact@v4
      #  with:
      #    name: code-coverage-report
      #    path: coverage.out

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        if: matrix.os == 'ubuntu-latest'
        env:
          # https://github.com/dolmen-go/sqlfunc/settings/secrets/actions
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          # See also sonar-project.properties
          args: >
            -Dsonar.go.tests.reportPaths=gotest.out
            -Dsonar.go.coverage.reportPaths=coverage.out

      - name: SonarQube Quality Gate
        id: sonarqube-quality-gate-check
        uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
        if: matrix.os == 'ubuntu-latest'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

